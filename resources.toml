# resources.toml
# Format:
#   [app_name]
#   macos = "brew install ..."
#   arch  = "pacman -S ..." | "yay -S ..." | "N/A"
#
# Rules:
#   - Do NOT add sudo, --needed, or --noconfirm here. install.sh adds them.
#   - Use "N/A" when a package is not available on that platform.
#   - Chained commands (&&) are allowed for macOS post-install hooks.
#   - For AUR packages use yay -S, for official repos use pacman -S.

[git]
macos = "brew install git"
arch  = "pacman -S git"

[stow]
macos = "brew install stow"
arch  = "pacman -S stow"

[curl]
macos = "brew install curl"
arch  = "pacman -S curl"

