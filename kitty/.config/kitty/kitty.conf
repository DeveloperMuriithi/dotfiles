# --- Font & Display ---
font_family      JetBrains Mono Nerd Font
font_size        11.0
modify_font      cell_height 110%
window_padding_width 15

# --- Cursor & Mouse ---
cursor_shape     beam
cursor_trail     3
cursor_trail_decay 0.1 0.4
cursor_blink_interval 0.5
copy_on_select   yes

# --- Behavior ---
confirm_os_window_close 0
background_opacity 0.85
background_blur 1
shell zsh

# --- THEME INCLUDE ---
# This looks for the theme file in the same directory
include n1ghtw1ng_theme.conf
